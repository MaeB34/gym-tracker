<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0f;--surface:#141418;--surface2:#1c1c22;--border:#2a2a32;--accent:#e8ff47;--accent2:#ff6b35;--text:#f0f0f5;--muted:#6b6b7a;--success:#47ffb2;--gold:#ffd166;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.4;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");}

  header{border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(13,13,15,.95);backdrop-filter:blur(12px);z-index:100;}
  .header-left{display:flex;align-items:baseline;gap:14px;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.12em;color:var(--accent);cursor:pointer;}
  header .subtitle{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .icon-btn{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);padding:6px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);}
  .icon-btn.gold{border-color:var(--gold);color:var(--gold);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;transition:background .3s;flex-shrink:0;}
  .sync-dot.syncing{background:var(--accent2);animation:pulse 1s infinite;}
  .sync-dot.synced{background:var(--success);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* MODALS */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;}
  .modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.08em;margin-bottom:6px;}
  .modal p{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:14px;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .btn-primary{flex:1;background:var(--accent);border:none;border-radius:3px;color:#0d0d0f;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:12px;cursor:pointer;transition:all .15s;}
  .btn-primary:hover{background:#f5ff7a;}
  .btn-secondary{flex:1;background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:12px;cursor:pointer;transition:all .15s;}
  .btn-secondary:hover{border-color:var(--muted);color:var(--text);}
  .btn-danger{flex:1;background:none;border:1px solid rgba(255,107,53,.4);border-radius:3px;color:var(--accent2);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:12px;cursor:pointer;transition:all .15s;}
  .btn-danger:hover{background:rgba(255,107,53,.1);}
  .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .form-group label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
  .form-group input,.form-group textarea,.form-group select{background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;padding:10px 12px;width:100%;outline:none;transition:border-color .15s;}
  .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent);}
  .form-group textarea{resize:vertical;min-height:72px;line-height:1.5;}
  .form-group input[type="date"]{color-scheme:dark;}
  .form-group input[readonly]{opacity:.45;cursor:not-allowed;}

  /* ALTERNATIVES */
  .alt-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  .alt-item{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .alt-item:hover{border-color:var(--accent);}
  .alt-item.active{border-color:var(--accent);background:rgba(232,255,71,.05);}
  .alt-item-name{font-size:.88rem;}
  .alt-item-tag{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:var(--muted);background:var(--surface2);padding:3px 8px;border-radius:2px;white-space:nowrap;}
  .alt-original{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.08em;margin-bottom:12px;padding:8px 10px;background:var(--bg);border-radius:3px;border-left:2px solid var(--border);}
  .swapped-badge{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;color:var(--accent2);background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);border-radius:2px;padding:3px 8px;vertical-align:middle;margin-left:8px;cursor:pointer;}

  /* ACHIEVEMENT POPUP */
  .achievement-popup{position:fixed;top:80px;right:24px;background:var(--surface);border:1px solid var(--gold);border-radius:8px;padding:16px 20px;max-width:300px;z-index:700;box-shadow:0 8px 40px rgba(255,209,102,.2);transform:translateX(120%);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
  .achievement-popup.show{transform:translateX(0);}
  .ach-popup-label{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
  .ach-popup-icon{font-size:2rem;margin-bottom:4px;}
  .ach-popup-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;margin-bottom:3px;}
  .ach-popup-desc{font-size:.75rem;color:var(--muted);line-height:1.4;}

  /* ACHIEVEMENTS PAGE */
  .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:20px;}
  .ach-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:18px 16px;text-align:center;transition:all .2s;position:relative;overflow:hidden;}
  .ach-card.unlocked{border-color:rgba(255,209,102,.4);background:rgba(255,209,102,.04);}
  .ach-card.unlocked:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,209,102,.12);}
  .ach-card.locked{opacity:.4;filter:grayscale(.6);}
  .ach-icon{font-size:2rem;margin-bottom:8px;}
  .ach-name{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.06em;margin-bottom:4px;}
  .ach-desc{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);line-height:1.4;}
  .ach-date{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--gold);margin-top:8px;letter-spacing:.08em;}
  .ach-rarity{position:absolute;top:8px;right:8px;font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;}
  .rarity-common{color:var(--muted);background:rgba(107,107,122,.15);}
  .rarity-rare{color:#60a5fa;background:rgba(96,165,250,.12);}
  .rarity-epic{color:#a78bfa;background:rgba(167,139,250,.12);}
  .rarity-legendary{color:var(--gold);background:rgba(255,209,102,.12);}
  .ach-stats-bar{display:flex;gap:12px;margin-bottom:20px;}
  .ach-stat{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;flex:1;text-align:center;}
  .ach-stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.05em;color:var(--gold);line-height:1;margin-bottom:3px;}
  .ach-stat-label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}

  /* PROGRESSION POPUP */
  .prog-popup{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--surface);border:1px solid rgba(232,255,71,.4);border-radius:8px;padding:20px 28px;max-width:340px;width:90%;z-index:700;box-shadow:0 8px 40px rgba(232,255,71,.15);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;text-align:center;}
  .prog-popup.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
  .prog-popup-icon{font-size:2.2rem;margin-bottom:8px;}
  .prog-popup-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.08em;color:var(--accent);margin-bottom:4px;}
  .prog-popup-body{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);line-height:1.6;margin-bottom:14px;}
  .prog-popup-new{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--accent);letter-spacing:.05em;line-height:1;margin-bottom:4px;}
  .prog-popup-close{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);padding:8px 20px;cursor:pointer;transition:all .15s;}
  .prog-popup-close:hover{border-color:var(--accent);color:var(--accent);}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 20px;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;color:var(--text);z-index:600;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* LAYOUT */
  #app{max-width:860px;margin:0 auto;padding:40px 24px 80px;}
  .view-title{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;}

  /* SPLITS */
  .split-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .split-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .split-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--card-accent,var(--accent));transform:scaleY(0);transform-origin:bottom;transition:transform .2s;}
  .split-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3);}
  .split-card:hover::before{transform:scaleY(1);}
  .split-number{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;margin-bottom:8px;opacity:.25;transition:opacity .2s;}
  .split-card:hover .split-number{opacity:.6;}
  .split-name{font-size:.95rem;font-weight:500;}
  .split-meta{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:6px;letter-spacing:.1em;}
  .split-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px;opacity:0;transition:opacity .15s;}
  .split-card:hover .split-actions{opacity:1;}
  .split-action-btn{background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:.65rem;padding:4px 8px;cursor:pointer;transition:all .15s;}
  .split-action-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* NAV */
  .back-btn{display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;margin-bottom:28px;padding:0;transition:color .15s;}
  .back-btn:hover{color:var(--accent);}
  .back-btn:hover svg{transform:translateX(-3px);}
  .back-btn svg{transition:transform .15s;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
  .section-header h2{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.06em;}
  .section-header-actions{display:flex;gap:8px;}

  /* EXERCISE LIST */
  .ex-list{display:flex;flex-direction:column;gap:6px;}
  .ex-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 16px 14px 20px;cursor:pointer;transition:all .15s;gap:10px;}
  .ex-row:hover{border-color:var(--accent);background:var(--surface2);}
  .ex-row.swapped{border-color:rgba(255,107,53,.35);}
  .ex-row-body{flex:1;min-width:0;}
  .ex-row-name{font-size:.9rem;font-weight:400;}
  .ex-row-meta{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.1em;margin-top:2px;}
  .ex-row-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .ex-row-arrow{color:var(--muted);font-size:1rem;}
  .swap-btn{background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:.75rem;padding:5px 8px;cursor:pointer;transition:all .15s;line-height:1;}
  .swap-btn:hover{border-color:var(--accent2);color:var(--accent2);}
  .swap-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(255,107,53,.08);}

  /* EXERCISE DETAIL */
  .detail-header{margin-bottom:28px;}
  .detail-title{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.05em;line-height:1;margin-bottom:4px;}
  .detail-subtitle{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.1em;margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

  /* CARD / FORM */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:24px;margin-bottom:20px;}
  .card-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:block;}
  .set-row{display:grid;grid-template-columns:auto 1fr 1fr;gap:10px;align-items:end;margin-bottom:10px;}
  .set-label{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;color:var(--muted);padding-bottom:10px;white-space:nowrap;min-width:48px;}
  .warmup-row{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:10px;align-items:end;margin-bottom:16px;}
  .edit-btn{background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:10px 12px;cursor:pointer;transition:all .15s;white-space:nowrap;align-self:end;}
  .edit-btn:hover{border-color:var(--accent);color:var(--accent);}
  .submit-btn{background:var(--accent);border:none;border-radius:3px;color:#0d0d0f;font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:14px 28px;cursor:pointer;width:100%;margin-top:8px;transition:all .15s;}
  .submit-btn:hover{background:#f5ff7a;transform:translateY(-1px);box-shadow:0 4px 20px rgba(232,255,71,.25);}
  .warmup-hint{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.08em;margin-bottom:12px;padding:8px 10px;background:var(--bg);border-radius:3px;border-left:2px solid var(--border);}

  /* NOTES */
  .notes-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .notes-display{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text);line-height:1.6;white-space:pre-wrap;}
  .notes-placeholder{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);font-style:italic;}

  /* HISTORY TABLE */
  .history-table{width:100%;border-collapse:collapse;}
  .history-table th{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-align:left;padding:0 0 10px;border-bottom:1px solid var(--border);}
  .history-table td{font-family:'DM Mono',monospace;font-size:.78rem;padding:10px 0;border-bottom:1px solid rgba(42,42,50,.5);}
  .history-table td.fire{color:var(--accent);font-weight:500;}
  .row-action-btn{background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:.7rem;padding:3px 7px;cursor:pointer;transition:all .15s;line-height:1;margin-left:3px;}
  .row-action-btn:hover{border-color:var(--accent);color:var(--accent);}
  .row-action-btn.del:hover{border-color:var(--accent2);color:var(--accent2);}
  .badge-pr{display:inline-block;background:rgba(232,255,71,.15);color:var(--accent);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.12em;padding:2px 7px;border-radius:2px;vertical-align:middle;margin-left:6px;}
  .empty-state{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);text-align:center;padding:32px;letter-spacing:.1em;}

  /* CHARTS */
  .charts-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
  .chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:16px 20px;height:320px;position:relative;}
  .chart-title{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}

  /* PR PAGE */
  .pr-section{margin-bottom:32px;}
  .pr-section-title{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .pr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
  .pr-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:18px 20px;transition:all .2s;cursor:default;}
  .pr-card:hover{border-color:rgba(232,255,71,.3);transform:translateY(-1px);}
  .pr-card.big3{border-color:rgba(255,209,102,.35);background:rgba(255,209,102,.03);}
  .pr-card.big3:hover{border-color:var(--gold);}
  .pr-exercise{font-size:.85rem;font-weight:400;margin-bottom:8px;color:var(--text);}
  .pr-weight{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.05em;line-height:1;color:var(--accent);}
  .pr-card.big3 .pr-weight{color:var(--gold);}
  .pr-detail{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);margin-top:4px;letter-spacing:.05em;}
  .pr-date{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:6px;}
  .big3-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.25);padding:2px 7px;border-radius:2px;margin-bottom:8px;}
  .big3-setup-card{background:var(--surface);border:1px solid rgba(255,209,102,.2);border-radius:4px;padding:20px 24px;margin-bottom:24px;}
  .big3-setup-card p{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);line-height:1.6;margin-bottom:14px;}
  .big3-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  /* EDIT SPLITS */
  .edit-split-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .edit-split-row{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
  .edit-split-row input{background:transparent;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;flex:1;outline:none;}
  .edit-split-handle{color:var(--muted);cursor:grab;font-size:.9rem;flex-shrink:0;}
  .edit-split-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:2px 6px;flex-shrink:0;transition:color .15s;}
  .edit-split-del:hover{color:var(--accent2);}
  .edit-ex-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .edit-ex-row{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px 14px;display:flex;align-items:center;gap:8px;}
  .edit-ex-row input{background:transparent;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;flex:1;outline:none;}
  .add-row-btn{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:none;border:1px dashed var(--border);border-radius:3px;padding:10px 14px;cursor:pointer;width:100%;transition:all .15s;}
  .add-row-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* LOADING */

// ═══ DATA LAYER ══════════════════════════════════════════════════════
let D = null; // live data object
let saveTimer = null;
let ignoreSnapshot = false;

function setSyncStatus(s){
  const dot=document.getElementById('syncDot'), lbl=document.getElementById('syncLabel');
  if(!dot||!lbl) return;
  dot.className='sync-dot '+s;
  lbl.textContent=s==='synced'?'Synced':s==='syncing'?'Saving…':'Offline';
}

function ensureFields(d){
  if(!d.achievements) d.achievements=[];
  if(d._usedSwap==null) d._usedSwap=false;
  if(!d.big3) d.big3={bench:null,squat:null,deadlift:null};
  d.splits.forEach((s,si)=>s.exercises.forEach((e,ei)=>{
    if(!e.alternatives) e.alternatives=DEFAULT_DATA.splits[si]?.exercises[ei]?.alternatives||[];
    if(!e.history) e.history=[];
    if(e.notes==null) e.notes='';
    // sort history oldest→newest
    e.history.sort((a,b)=>a.date.localeCompare(b.date));
  }));
}

async function initData(){
  try {
    const snap = await getDoc(DATA_DOC);
    if(snap.exists()){
      D = snap.data();
      ensureFields(D);
    } else {
      D = JSON.parse(JSON.stringify(DEFAULT_DATA));
      await setDoc(DATA_DOC, D);
    }
    setSyncStatus('synced');
  } catch(e){
    D = JSON.parse(JSON.stringify(DEFAULT_DATA));
    setSyncStatus('offline');
  }

  // Live listener — auto-pull changes from other devices
  onSnapshot(DATA_DOC, snap => {
    if(ignoreSnapshot) return;
    if(!snap.exists()) return;
    const incoming = snap.data();
    ensureFields(incoming);
    D = incoming;
    updateAchCount();
    // Re-render current view silently (only if on splits/PRs/achievements page to avoid disrupting mid-form)
    const nav = getNav();
    if(nav.view==='splits') showSplits();
    else if(nav.view==='achievements') showAchievements();
    else if(nav.view==='prs') showPRs();
  });
}

function saveData(){
  if(!D) return;
  setSyncStatus('syncing');
  ignoreSnapshot = true;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try {
      await setDoc(DATA_DOC, D);
      setSyncStatus('synced');
    } catch(e){
      setSyncStatus('offline');
      showToast('Save failed — check connection.');
    }
    setTimeout(()=>{ ignoreSnapshot=false; }, 1500);
  }, 500);
}

// ═══ ACHIEVEMENTS ENGINE ═════════════════════════════════════════════
let achQueue=[], achShowing=false;
function checkAchievements(){
  const have=new Set((D.achievements||[]).map(a=>a.id)), neu=[];
  ACHIEVEMENTS.forEach(def=>{
    if(have.has(def.id)) return;
    try{ if(def.check(D)){ D.achievements.push({id:def.id,unlockedAt:new Date().toISOString()}); neu.push(def); } }catch(e){}
  });
  if(neu.length){ saveData(); neu.forEach(a=>achQueue.push(a)); drainAch(); updateAchCount(); }
}
function drainAch(){
  if(achShowing||!achQueue.length) return;
  const a=achQueue.shift(); achShowing=true;
  document.getElementById('achPopupIcon').textContent=a.icon;
  document.getElementById('achPopupName').textContent=a.name;
  document.getElementById('achPopupDesc').textContent=a.desc;
  const p=document.getElementById('achPopup'); p.classList.add('show');
  setTimeout(()=>{ p.classList.remove('show'); setTimeout(()=>{ achShowing=false; drainAch(); },450); },3500);
}
function updateAchCount(){
  const n=(D?.achievements||[]).length;
  const el=document.getElementById('achCount'); if(el) el.textContent=n;
  const btn=document.getElementById('achBtn'); if(btn&&n>0) btn.classList.add('gold');
}

// ═══ SWAPS ════════════════════════════════════════════════════════════
const swaps={};
const swapKey=(si,ei)=>`${si}_${ei}`;
function getEff(si,ei){ return swaps[swapKey(si,ei)]||D.splits[si].exercises[ei]; }
function isSwapped(si,ei){ return !!swaps[swapKey(si,ei)]; }

function openAltsModal(si,ei,event){
  if(event) event.stopPropagation();
  const orig=D.splits[si].exercises[ei], alts=orig.alternatives||[];
  if(!alts.length){ showToast('No alternatives for this exercise.'); return; }
  const cur=swaps[swapKey(si,ei)];
  const overlay=document.createElement('div'); overlay.className='modal-overlay'; overlay.id='altsModal';
  const revert=cur?`<div class="alt-item" onclick="revertSwap(${si},${ei})" style="border-color:rgba(232,255,71,.2)"><span class="alt-item-name">↩ Use Original: ${orig.name}</span><span class="alt-item-tag">Revert</span></div>`:'';
  const list=alts.map((a,ai)=>`<div class="alt-item${cur&&cur.name===a?' active':''}" onclick="applySwap(${si},${ei},${ai})"><span class="alt-item-name">${a}</span>${cur&&cur.name===a?'<span class="alt-item-tag">Active</span>':''}</div>`).join('');
  overlay.innerHTML=`<div class="modal"><h3>Alternative Exercises</h3><div class="alt-original">Original: <strong>${orig.name}</strong></div><p style="margin-bottom:10px">Pick a substitute for this session. Swap resets when you leave.</p><div class="alt-list">${revert}${list}</div><div class="modal-actions" style="margin-top:20px"><button class="btn-secondary" onclick="closeModal('altsModal')">Cancel</button></div></div>`;
  overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal('altsModal'); });
  document.body.appendChild(overlay);
}
function applySwap(si,ei,ai){
  const orig=D.splits[si].exercises[ei];
  swaps[swapKey(si,ei)]={name:orig.alternatives[ai],warmupWeight:orig.warmupWeight,warmupReps:orig.warmupReps,workingWeight:orig.workingWeight,notes:orig.notes,history:[],alternatives:orig.alternatives,_isSwap:true};
  D._usedSwap=true; saveData(); closeModal('altsModal');
  const s=getNav(); if(s.view==='split') showExercises(si); else showExerciseDetail(si,ei);
}
function revertSwap(si,ei){
  delete swaps[swapKey(si,ei)]; closeModal('altsModal');
  const s=getNav(); if(s.view==='split') showExercises(si); else showExerciseDetail(si,ei);
}

const COLORS=['#e8ff47','#ff6b35','#47ffb2','#a78bfa','#60a5fa','#f472b6'];
function backIcon(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>`; }

// ── SPLITS HOME ────────────────────────────────────────────────────
function showSplits(){
  setNav({view:'splits'}); destroyCharts();
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">

      <div class="split-meta">${split.exercises.length} EXERCISES</div>
    </div>`;
  });
  html+=`</div>`;

}

// ── EXERCISE LIST ──────────────────────────────────────────────────
function showExercises(si){
  setNav({view:'split',si}); destroyCharts();
  const split=D.splits[si];
  let html=`<button class="back-btn animate" onclick="showSplits()">${backIcon()} All Workouts</button>
    <div class="section-header animate">
      <h2>${split.name}</h2>
      <div class="section-header-actions">
        <button class="icon-btn" onclick="openEditExercisesModal(${si})">✎ Edit Exercises</button>
      </div>
    </div>
    <div class="ex-list">`;
  split.exercises.forEach((ex,i)=>{
    const swapped=isSwapped(si,i), eff=getEff(si,i);
    const sorted=[...eff.history].sort((a,b)=>a.date.localeCompare(b.date));
    const last=sorted[sorted.length-1];
    const meta=last?`Last: ${last.set1.weight}kg — ${last.date}`:'No sessions yet';
    const hasAlts=(ex.alternatives||[]).length>0;
    html+=`<div class="ex-row animate animate-delay-${Math.min(i+1,3)} ${swapped?'swapped':''}" onclick="showExerciseDetail(${si},${i})">

// ── SUBMIT WORKOUT ──────────────────────────────────────────────────
function submitWorkout(si,ei){
  const ex=D.splits[si].exercises[ei];
  const swapped=isSwapped(si,ei), effName=swapped?swaps[swapKey(si,ei)].name:ex.name;
  const dateVal=document.getElementById('date').value;
  const s1w=Number(document.getElementById('s1w').value);
  const s1r=Number(document.getElementById('s1r').value);
  const s2r=Number(document.getElementById('s2r').value);
  if(!dateVal||(!s1r&&!s2r)){ showToast('Add a date and at least one set.'); return; }
  const progressed=s1r>=12&&s2r>=12;
  const entry={date:dateVal,set1:{weight:s1w,reps:s1r},set2:{weight:s1w,reps:s2r},...(swapped?{altName:effName}:{})};
  entry.progressed=progressed;
  if(progressed) ex.workingWeight=+(s1w+2).toFixed(1);
  ex.history.push(entry);
  ex.history.sort((a,b)=>a.date.localeCompare(b.date));
  saveData();
  checkAchievements();
  if(progressed){
    showProgPopup(ex.workingWeight);
  } else {
    showToast('Session saved ✓');
  }
  showExerciseDetail(si,ei);
}

// ── HISTORY TABLE ──────────────────────────────────────────────────
function renderHistory(ex,si,ei){
  const el=document.getElementById('history');
  if(!ex.history.length){ el.innerHTML=`<div class="empty-state">No sessions logged yet</div>`; return; }
  const sorted=[...ex.history].sort((a,b)=>b.date.localeCompare(a.date)); // newest first for display
  let html=`<table class="history-table"><thead><tr><th>Date</th><th>Set 1</th><th>Set 2</th><th>Volume</th><th></th></tr></thead><tbody>`;
  sorted.forEach((e)=>{
    const realIdx=ex.history.findIndex(h=>h.date===e.date&&h.set1.weight===e.set1.weight&&h.set1.reps===e.set1.reps);
    const vol=(e.set1.weight*e.set1.reps)+(e.set2.weight*e.set2.reps);
    const alt=e.altName?`<span class="alt-item-tag" style="margin-left:6px">${e.altName}</span>`:'';
    html+=`<tr>
      <td>${e.date}${e.progressed?`<span class="badge-pr">↑ PR</span>`:''}${alt}</td>
      <td>${e.set1.weight}kg × ${e.set1.reps}</td>
      <td>${e.set2.weight}kg × ${e.set2.reps}</td>
      <td class="${e.progressed?'fire':''}">${vol}kg</td>
      <td style="white-space:nowrap">
        <button class="row-action-btn" onclick="openEditLog(${si},${ei},${realIdx})">✎</button>
        <button class="row-action-btn del" onclick="deleteLog(${si},${ei},${realIdx})">✕</button>
      </td>
    </tr>`;
  });
  html+=`</tbody></table>`;
  el.innerHTML=html;
}

function deleteLog(si,ei,idx){

// ── CHARTS ────────────────────────────────────────────────────────
function renderCharts(ex){
  const sorted=[...ex.history].sort((a,b)=>a.date.localeCompare(b.date));
  const labels=sorted.map(e=>e.date);
  const weights=sorted.map(e=>Math.max(e.set1.weight,e.set2.weight));
  const avgReps=sorted.map(e=>{ const t=e.set1.reps+e.set2.reps,s=(e.set1.reps>0?1:0)+(e.set2.reps>0?1:0); return s?+(t/s).toFixed(1):0; });
  const volume=sorted.map(e=>(e.set1.weight*e.set1.reps)+(e.set2.weight*e.set2.reps));
  const base={responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#6b6b7a',boxWidth:10,font:{size:9}}},tooltip:{backgroundColor:'#1c1c22',borderColor:'#2a2a32',borderWidth:1,titleColor:'#6b6b7a',bodyColor:'#f0f0f5',padding:10}},
    scales:{x:{grid:{color:'#1e1e24'},ticks:{maxTicksLimit:8,font:{size:9}}}}};
  const ctxW=document.getElementById('chartWeight');
  if(ctxW) charts.weight=new Chart(ctxW,{type:'line',data:{labels,datasets:[
    {label:'Weight (kg)',data:weights,borderColor:'#e8ff47',backgroundColor:'rgba(232,255,71,.06)',pointBackgroundColor:'#e8ff47',pointRadius:3,borderWidth:2,tension:.35,fill:true,yAxisID:'y'},
    {label:'Avg Reps',data:avgReps,borderColor:'#ff6b35',backgroundColor:'transparent',pointBackgroundColor:'#ff6b35',pointRadius:3,borderWidth:2,borderDash:[4,3],tension:.35,yAxisID:'y1'}
  ]},options:{...base,scales:{x:base.scales.x,
    y:{position:'left',grid:{color:'#1e1e24'},ticks:{font:{size:9},callback:v=>v+'kg'}},
    y1:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:9},callback:v=>v+' reps'}}
  }}});
  const ctxV=document.getElementById('chartVolume');
  if(ctxV) charts.volume=new Chart(ctxV,{type:'bar',data:{labels,datasets:[
    {label:'Volume (kg)',data:volume,backgroundColor:'rgba(71,255,178,.15)',borderColor:'#47ffb2',borderWidth:1.5,borderRadius:2,hoverBackgroundColor:'rgba(71,255,178,.3)',yAxisID:'y'},
    {label:'Trend',data:volume,type:'line',borderColor:'#a78bfa',backgroundColor:'transparent',pointBackgroundColor:'#a78bfa',pointRadius:3,borderWidth:2,tension:.35,yAxisID:'y'}
  ]},options:{...base,scales:{x:base.scales.x,y:{position:'left',grid:{color:'#1e1e24'},ticks:{font:{size:9},callback:v=>v+'kg'}}}}});
}

// ── PR PAGE ────────────────────────────────────────────────────────
function showPRs(){
  setNav({view:'prs'}); destroyCharts();

  // Collect all-time best per exercise
  const allPRs=[];
  D.splits.forEach((split,si)=>{
    split.exercises.forEach((ex,ei)=>{
      if(!ex.history.length) return;
      let best=null;
      ex.history.forEach(h=>{
        const w=Math.max(h.set1.weight,h.set2.weight);
        if(!best||w>best.weight) best={weight:w,date:h.date,set1:h.set1,set2:h.set2};
      });
      if(best) allPRs.push({name:ex.name,si,ei,...best});
    });
  });

  const isBig3=(name)=>{
    if(!D.big3) return null;
    if(D.big3.bench===name) return 'BENCH';
    if(D.big3.squat===name) return 'SQUAT';
    if(D.big3.deadlift===name) return 'DEADLIFT';
    return null;
  };

  const big3PRs=allPRs.filter(p=>isBig3(p.name));
  const otherPRs=allPRs.filter(p=>!isBig3(p.name)).sort((a,b)=>b.weight-a.weight);

  let html=`<button class="back-btn animate" onclick="showSplits()">${backIcon()} Home</button>
    <div class="section-header animate">
      <h2>Personal Records</h2>
    </div>`;

  // Big 3 setup card
  html+=`<div class="big3-setup-card animate animate-delay-1">
    <p>Tag your main lifts as the Big 3 to highlight them at the top of this page.</p>
    <div class="big3-row">
      ${['bench','squat','deadlift'].map(k=>{
        const opts=`<option value="">— not set —</option>`+allPRs.map(p=>`<option value="${escHtml(p.name)}"${D.big3[k]===p.name?' selected':''}>${escHtml(p.name)}</option>`).join('');
        return `<div class="form-group" style="margin-bottom:0"><label>${k.charAt(0).toUpperCase()+k.slice(1)}</label><select onchange="setBig3('${k}',this.value)">${opts}</select></div>`;
      }).join('')}
    </div>
  </div>`;

  // Big 3 cards
  if(big3PRs.length){
    html+=`<div class="pr-section animate animate-delay-1"><div class="pr-section-title">The Big 3</div><div class="pr-grid">`;
    big3PRs.forEach(p=>{
      const tag=isBig3(p.name);
      html+=`<div class="pr-card big3">
        <div class="big3-tag">${tag}</div>
        <div class="pr-exercise">${p.name}</div>
        <div class="pr-weight">${p.weight}<span style="font-size:1.2rem">kg</span></div>
        <div class="pr-detail">${p.set1.weight}kg × ${p.set1.reps} / ${p.set2.weight}kg × ${p.set2.reps}</div>
        <div class="pr-date">${p.date}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // All other PRs
  if(otherPRs.length){
    html+=`<div class="pr-section animate animate-delay-2"><div class="pr-section-title">All Exercises</div><div class="pr-grid">`;
    otherPRs.forEach(p=>{
      html+=`<div class="pr-card">
        <div class="pr-exercise">${p.name}</div>
        <div class="pr-weight">${p.weight}<span style="font-size:1.2rem">kg</span></div>
        <div class="pr-detail">${p.set1.weight}kg × ${p.set1.reps} / ${p.set2.weight}kg × ${p.set2.reps}</div>
        <div class="pr-date">${p.date}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  if(!allPRs.length){
    html+=`<div class="empty-state animate animate-delay-1">No sessions logged yet — your PRs will appear here after your first workout.</div>`;
  }

  document.getElementById('app').innerHTML=html;
}

function setBig3(key, val){
  if(!D.big3) D.big3={bench:null,squat:null,deadlift:null};
  D.big3[key]=val||null;
  saveData();
  showPRs();
}

function showAchievements(){
  setNav({view:'achievements'}); destroyCharts();
  const um={}; (D.achievements||[]).forEach(a=>um[a.id]=a.unlockedAt);
  const total=ACHIEVEMENTS.length, unlocked=Object.keys(um).length;
  let html=`<button class="back-btn animate" onclick="showSplits()">${backIcon()} Home</button>
    <div class="section-header animate"><h2>Achievements</h2></div>
    <div class="ach-stats-bar animate animate-delay-1">
      <div class="ach-stat"><div class="ach-stat-num">${unlocked}</div><div class="ach-stat-label">Unlocked</div></div>
      <div class="ach-stat"><div class="ach-stat-num">${total}</div><div class="ach-stat-label">Total</div></div>
      <div class="ach-stat"><div class="ach-stat-num">${totalSessions(D)}</div><div class="ach-stat-label">Sessions</div></div>
      <div class="ach-stat"><div class="ach-stat-num">${totalPRs(D)}</div><div class="ach-stat-label">PRs</div></div>
    </div>
    <div class="ach-grid animate animate-delay-2">`;
  [...ACHIEVEMENTS].sort((a,b)=>(um[b.id]?1:0)-(um[a.id]?1:0)).forEach(a=>{
    const on=!!um[a.id], ds=on?new Date(um[a.id]).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';
    html+=`<div class="ach-card ${on?'unlocked':'locked'}"><span class="ach-rarity rarity-${a.rarity}">${a.rarity}</span><div class="ach-icon">${a.icon}</div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div>${on?`<div class="ach-date">Unlocked ${ds}</div>`:''}</div>`;
  });
  html+=`</div>`; document.getElementById('app').innerHTML=html;
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  openAltsModal, applySwap, revertSwap, closeModal,
  openNotesModal, saveNotes,
  openEditSplitsModal, renameSplit, deleteSplit, addSplit,
  openEditExercisesModal, renameExercise, deleteExercise, addExercise,
  setBig3,
});

document.getElementById('app').innerHTML=`<div class="loading-screen"><div class="spinner"></div><p>Loading your data…</p></div>`;
await initData();
updateAchCount();

if(_nav.view==='splits')            showSplits();
else if(_nav.view==='split')        showExercises(_nav.si);

else if(_nav.view==='achievements') showAchievements();
else if(_nav.view==='prs')          showPRs();
else showSplits();
